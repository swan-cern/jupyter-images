name: _release-image

on:
  workflow_call:
    inputs:
      image:
        required: true
        type: string
      children:
        required: false
        type: string
        default: ""
      notify-swan-charts:
        required: false
        type: boolean
        default: false
      skip-build:
        required: false
        type: boolean
        default: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Fetch all tags

      - name: Calculate next version
        id: version
        run: |
          LAST_TAG=$(git tag -l "${{ inputs.image }}/v*" --sort=-v:refname | head -n 1)
          if [ -z "$LAST_TAG" ]; then
            echo "::error::No existing tag found for ${{ inputs.image }}"
            exit 1
          fi
          LAST_VERSION="${LAST_TAG#${{ inputs.image }}/v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$LAST_VERSION"
          # Bump only the patch version. We don't follow semver, so for our use case,
          # it's enough to just increment the patch version for each new release.
          # We can always extend the logic later if we need to support minor or major version bumps.
          VERSION="v${MAJOR}.${MINOR}.$((PATCH + 1))"
          echo "new_tag=${{ inputs.image }}/${VERSION}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "last_tag=${LAST_TAG}" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        run: |
          git tag "${{ steps.version.outputs.new_tag }}"
          git push origin "${{ steps.version.outputs.new_tag }}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEW_TAG: ${{ steps.version.outputs.new_tag }}
          LAST_TAG: ${{ steps.version.outputs.last_tag }}
        run: |
          NOTES=$(git log "${LAST_TAG}..${NEW_TAG}" --pretty='- %h %s')
          gh release create "$NEW_TAG" --notes "$NOTES"

  build-and-push:
    if: ${{ !inputs.skip-build }}
    runs-on: ubuntu-latest
    needs: release

    steps:
      - uses: actions/checkout@v6
        with:
          ref: main # Upstream image actions may have pushed new commits, we need to checkout the latest main

      - name: Log in to GitLab Container Registry
        uses: docker/login-action@v4
        with:
          registry: gitlab-registry.cern.ch
          username: ${{ github.actor }}
          password: ${{ secrets.GITLAB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: ./${{ inputs.image }}
          build-args: BUILD_TAG=${{ needs.release.outputs.version }}
          push: true
          tags: gitlab-registry.cern.ch/swan/docker-images/jupyter/${{ inputs.image }}:${{ needs.release.outputs.version }}

  update-children:
    if: inputs.children != ''
    runs-on: ubuntu-latest
    needs: [release, build-and-push]
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          ref: main # Upstream image actions may have pushed new commits, we need to checkout the latest main
          persist-credentials: false

      - name: Update VERSION_PARENT in child Dockerfiles
        env:
          VERSION: ${{ needs.release.outputs.version }}
          CHILDREN: ${{ inputs.children }}
        run: |
          for child in $CHILDREN; do
            sed -i "s/^ARG VERSION_PARENT=.*/ARG VERSION_PARENT=${VERSION}/" "${child}/Dockerfile"
          done

      - name: Commit and push
        env:
          IMAGE: ${{ inputs.image }}
          VERSION: ${{ needs.release.outputs.version }}
          WORKFLOW_ACCESS_TOKEN: ${{ secrets.WORKFLOW_ACCESS_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet && exit 0
          git commit -m "Update children to ${IMAGE} ${VERSION}"
          # Bypass branch protection rules by using the workflow access token
          git remote set-url origin "https://x-access-token:${WORKFLOW_ACCESS_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push

  notify-swan-charts:
    if: inputs.notify-swan-charts
    runs-on: ubuntu-latest
    needs: [release, build-and-push]

    steps:
      - name: Trigger image version update in swan-charts
        env:
          GH_TOKEN: ${{ secrets.WORKFLOW_ACCESS_TOKEN }}
        run: |
          gh workflow run "Update jupyter and jupyterhub images" \
            --repo swan-cern/swan-charts \
            --ref master \
            -f image="jupyter/${{ inputs.image }}" \
            -f version="${{ needs.release.outputs.version }}"
