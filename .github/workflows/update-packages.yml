name: Update packages of Jupyter images

on:
  workflow_dispatch:
    inputs:
      package:
        description: 'Package Name'
        required: true
      version:
        description: 'Package Version'
        required: true

permissions:
  contents: write
  pull-requests: write

jobs:
  update-package:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
      with:
        ref: master

    - name: Update package version
      run: |
        PKG_NAME_LOWER=$(echo " ${{ inputs.package }}" | tr '[:upper:]' '[:lower:]')
        # Some packages have different names on PyPI
        if [[ "$PKG_NAME_LOWER" == "swanmarimoproxy" ]]; then
          PKG_NAME_LOWER="swan-marimo-proxy"
        fi
        PKG_VER=$(echo "${{ inputs.version }}" | sed -e "s/v//g")

        for DIR in base swan swan-cern; do
          sed -i "s/\( $PKG_NAME_LOWER==*\)[^ ]*/\1$PKG_VER/" "$DIR/Dockerfile"
        done

    - name: Create Pull Request
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        BRANCH="${{ inputs.package }}-${{ inputs.version }}"
        MESSAGE="Updated package ${{ inputs.package }} to version ${{ inputs.version }}"

        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git checkout -b "$BRANCH"
        git add base/Dockerfile swan/Dockerfile swan-cern/Dockerfile
        git commit -m "$MESSAGE"
        git push origin "$BRANCH"
        gh pr create --title "$MESSAGE" --body "" --head "$BRANCH" --base master
