name: Release
run-name: Release ${{ inputs.image }} by @${{ github.actor }}

on:
  workflow_dispatch:
    inputs:
      image:
        description: "Image to release"
        required: true
        type: choice
        options:
          - base
          - swan
          - swan-cern
          - swan-accpy
          - prefetcher

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Calculate next version
        id: version
        run: |
          LAST_TAG=$(git tag -l "${{ inputs.image }}/v*" --sort=-v:refname | head -n 1)
          if [ -z "$LAST_TAG" ]; then
            echo "::error::No existing tag found for ${{ inputs.image }}"
            exit 1
          fi
          LAST_VERSION="${LAST_TAG#${{ inputs.image }}/v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$LAST_VERSION"
          echo "new_tag=${{ inputs.image }}/v${MAJOR}.${MINOR}.$((PATCH + 1))" >> "$GITHUB_OUTPUT"
          echo "last_tag=${LAST_TAG}" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        env:
          WORKFLOW_ACCESS_TOKEN: ${{ secrets.WORKFLOW_ACCESS_TOKEN }}
        run: |
          git tag "${{ steps.version.outputs.new_tag }}"
          git remote set-url origin "https://x-access-token:${WORKFLOW_ACCESS_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push origin "${{ steps.version.outputs.new_tag }}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEW_TAG: ${{ steps.version.outputs.new_tag }}
          LAST_TAG: ${{ steps.version.outputs.last_tag }}
        run: |
          NOTES=$(git log "${LAST_TAG}..${NEW_TAG}" --pretty='- %h %s')
          gh release create "$NEW_TAG" --notes "$NOTES"
