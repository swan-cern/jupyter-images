name: Build and push Image

on:
  push:
    tags:
    - base/*
    - swan/*
    - swan-cern/*
    - swan-accpy/*
    - prefetcher/*

jobs:
  build_image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Parse tag into image name and version
        run: |
          echo "IMAGE_NAME=$(echo "${{ github.ref_name }}" | cut -d / -f 1)"    >> $GITHUB_ENV
          echo "IMAGE_VERSION=$(echo "${{ github.ref_name }}" | cut -d / -f 2)" >> $GITHUB_ENV

      - name: Log in to GitLab Container Registry
        uses: docker/login-action@v4
        with:
          registry: gitlab-registry.cern.ch
          username: ${{ github.actor }}
          password: ${{ secrets.GITLAB_TOKEN }}

      - name: Build and push image to GitLab Container Registry
        uses: docker/build-push-action@v7
        with:
          context: ${{ github.workspace }}/${{ env.IMAGE_NAME }}
          build-args: BUILD_TAG=${{ env.IMAGE_VERSION }}
          push: true
          tags: gitlab-registry.cern.ch/swan/docker-images/jupyter/${{ env.IMAGE_NAME }}:${{ env.IMAGE_VERSION }}
