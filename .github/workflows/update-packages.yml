name: Update packages of Jupyter images

on:
  workflow_dispatch:
    inputs:
      package:
        description: 'Package Name'
        required: true
      version:
        description: 'Package Version'
        required: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}  # Deny all permissions by default at workflow level

jobs:
  update-package:
    runs-on: ubuntu-latest
    env:
      PACKAGE: ${{ inputs.package }}
      VERSION: ${{ inputs.version }}
    permissions:
      contents: write # Required to push changes to the repository
      pull-requests: write # Required to create pull requests

    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        ref: master
        persist-credentials: false

    - name: Update package version
      run: |
        PKG_NAME_LOWER=$(echo "${PACKAGE}" | tr '[:upper:]' '[:lower:]')
        # Some packages have different names on PyPI
        if [[ "$PKG_NAME_LOWER" == "swanmarimoproxy" ]]; then
          PKG_NAME_LOWER="swan-marimo-proxy"
        fi
        if [[ "$PKG_NAME_LOWER" == "swanml" ]]; then
          PKG_NAME_LOWER="swan-ml"
        fi
        PKG_VER=$(echo "${VERSION}" | sed -e "s/v//g")

        for DIR in base swan swan-cern; do
          sed -i "s/\( $PKG_NAME_LOWER==*\)[^ ]*/\1$PKG_VER/" "$DIR/Dockerfile"
        done

    - name: Create Pull Request
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        BRANCH="${PACKAGE}-${VERSION}"
        MESSAGE="Updated package ${PACKAGE} to version ${VERSION}"

        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
        git checkout -b "$BRANCH"
        git add base/Dockerfile swan/Dockerfile swan-cern/Dockerfile
        git commit -m "$MESSAGE"
        git push origin "$BRANCH"
        gh pr create --title "$MESSAGE" --body "" --head "$BRANCH" --base master
