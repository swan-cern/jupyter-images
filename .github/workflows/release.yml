name: Release
run-name: Release ${{ inputs.image }} (and dependents) by @${{ github.actor }}

on:
  workflow_dispatch:
    inputs:
      image:
        description: "Image to release"
        required: true
        type: choice
        options:
          - base
          - swan
          - swan-cern
          - swan-accpy
          - prefetcher

# Dependency tree:
#   base → swan → swan-cern → swan-accpy
#                           → prefetcher

permissions: {}  # Deny all permissions by default at workflow level

jobs:
  release-base:
    if: inputs.image == 'base'
    uses: ./.github/workflows/_release-image.yml
    permissions:
      contents: write # Required by the nested workflow
    with:
      image: base
      children: swan
    secrets:
      GITLAB_TOKEN: ${{ secrets.GITLAB_TOKEN }}
      WORKFLOW_ACCESS_TOKEN: ${{ secrets.WORKFLOW_ACCESS_TOKEN }}

  release-swan:
    if: >-
      !failure() && !cancelled() &&
      contains(fromJSON('["base", "swan"]'), inputs.image)
    needs: release-base
    uses: ./.github/workflows/_release-image.yml
    permissions:
      contents: write # Required by the nested workflow
    with:
      image: swan
      children: swan-cern
      notify-swan-charts: true
    secrets:
      GITLAB_TOKEN: ${{ secrets.GITLAB_TOKEN }}
      WORKFLOW_ACCESS_TOKEN: ${{ secrets.WORKFLOW_ACCESS_TOKEN }}

  release-swan-cern:
    if: >-
      !failure() && !cancelled() &&
      contains(fromJSON('["base", "swan", "swan-cern"]'), inputs.image)
    needs: release-swan
    uses: ./.github/workflows/_release-image.yml
    permissions:
      contents: write # Required by the nested workflow
    with:
      image: swan-cern
      children: "swan-accpy prefetcher"
      notify-swan-charts: true
    secrets:
      GITLAB_TOKEN: ${{ secrets.GITLAB_TOKEN }}
      WORKFLOW_ACCESS_TOKEN: ${{ secrets.WORKFLOW_ACCESS_TOKEN }}

  release-swan-accpy:
    if: >-
      !failure() && !cancelled() &&
      contains(fromJSON('["base", "swan", "swan-cern", "swan-accpy"]'), inputs.image)
    needs: release-swan-cern
    uses: ./.github/workflows/_release-image.yml
    permissions:
      contents: write # Required by the nested workflow
    with:
      image: swan-accpy
      skip-build: true  # Built on GitLab CI (needs CERN network for acc-py installers)
    secrets:
      GITLAB_TOKEN: ${{ secrets.GITLAB_TOKEN }}
      WORKFLOW_ACCESS_TOKEN: ${{ secrets.WORKFLOW_ACCESS_TOKEN }}

  release-prefetcher:
    if: >-
      !failure() && !cancelled() &&
      contains(fromJSON('["base", "swan", "swan-cern", "prefetcher"]'), inputs.image)
    needs: release-swan-cern
    uses: ./.github/workflows/_release-image.yml
    permissions:
      contents: write # Required by the nested workflow
    with:
      image: prefetcher
    secrets:
      GITLAB_TOKEN: ${{ secrets.GITLAB_TOKEN }}
      WORKFLOW_ACCESS_TOKEN: ${{ secrets.WORKFLOW_ACCESS_TOKEN }}
